name: Build Addon

# This workflow creates a usable addon zip for each commit.

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Our Python deps live in the dev script's PEP 723 block, not a
          # pyproject or lockfile, so key the uv cache on it. Without this the
          # cache never invalidates and setup-uv warns about it.
          cache-dependency-glob: dev

      - name: Install subversion
        # ./dev build fetches the embedded Ace3 libraries over SVN.
        run: sudo apt-get install -y subversion

      - name: Build
        run: ./dev build

      - name: Upload build
        uses: actions/upload-artifact@v6
        with:
          name: ItemVersion
          include-hidden-files: true
          path: |
            dist/
            !dist/*.zip
