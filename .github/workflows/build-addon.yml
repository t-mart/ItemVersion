name: Build Addon

# This workflow creates a usable addon zip for each commit.

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install subversion
        # ./dev build fetches the embedded Ace3 libraries over SVN.
        run: sudo apt-get install -y subversion

      - name: Build
        run: ./dev build

      - name: Upload build
        uses: actions/upload-artifact@v6
        with:
          name: ItemVersion
          include-hidden-files: true
          path: |
            dist/
            !dist/*.zip
