name: Checks

# Lint, formatting, locale checks, and the addon's Lua test suite, on pull
# requests and on master.
#
# This runs `./dev check`, which is the same command you run locally, so
# a green run here means the same thing as a green run on your machine. It also
# runs `./dev test-tooling`, the pytest suite for the ./dev tooling itself.

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
  # So the release workflow can gate on these same checks. It passes the exact
  # candidate SHA rather than whatever the release branch points at later.
  workflow_call:
    inputs:
      ref:
        type: string
        required: false

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Empty on normal triggers, which makes checkout use the triggering
          # ref; set to the candidate SHA when called from the release workflow.
          ref: ${{ inputs.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Our Python deps live in the dev script's PEP 723 block, not a
          # pyproject or lockfile, so key the uv cache on it. Without this the
          # cache never invalidates and setup-uv warns about it.
          cache-dependency-glob: dev

      # Straight from each project's releases, because both ship a prebuilt
      # binary. cargo binstall was building selene from source, which dominated an
      # otherwise ~4ms lint: selene publishes no [package.metadata.binstall], so
      # binstall cannot match its release asset to a target triple and falls back
      # to compiling. Downloading takes about a second.
      #
      # Pinned so a new upstream release cannot fail an unrelated pull request.
      # Bump them when the version you lint with locally moves on.
      - name: Install selene and stylua
        env:
          SELENE_VERSION: "0.31.0"
          STYLUA_VERSION: "2.5.2"
        run: |
          BIN="$HOME/.local/bin"
          mkdir -p "$BIN"
          cd "$(mktemp -d)"

          curl -sSfL -O "https://github.com/Kampfkarren/selene/releases/download/${SELENE_VERSION}/selene-${SELENE_VERSION}-linux.zip"
          curl -sSfL -O "https://github.com/JohnnyMorganz/StyLua/releases/download/v${STYLUA_VERSION}/stylua-linux-x86_64.zip"

          unzip -qo "selene-${SELENE_VERSION}-linux.zip"
          unzip -qo stylua-linux-x86_64.zip

          chmod +x selene stylua
          mv selene stylua "$BIN/"
          echo "$BIN" >> "$GITHUB_PATH"

      # WoW ships a customized PUC-Rio Lua 5.1, so the addon's suite targets 5.1.
      # Noble provides binary packages for both Lua and Busted; using them avoids
      # compiling Lua, LuaRocks, and Busted's native dependencies on every runner.
      - name: Install Lua test runner
        run: sudo apt-get install -y lua5.1 lua-busted

      - name: Check
        run: ./dev check

      # The dev tooling's own pytest suite. Separate from check because it exercises
      # ./dev itself, not the addon, and needs nothing beyond uv.
      - name: Tooling tests
        run: ./dev test-tooling
