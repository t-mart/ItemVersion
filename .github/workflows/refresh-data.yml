name: Refresh Data and Release

# 1. On release branch, download the new Data.lua from an item-version-scrape
#    release, and commit and push it. (This is intentionally not done on master
#    branch -- master branch has a different lifecycle than the weekly data
#    refreshes. master branch is where we do development, and we don't want
#    master's possibly-unfinished work to be auto-released to CurseForge.)
# 2. Run release workflow (see release.yml)
#
# The scrape itself now happens in item-version-scrape, which produces a GH release
# and then dispatches this workflow with the release tag to pull from. This
# workflow is triggered by item-version-scrape (or by manual workflow_dispatch).
#
# This workflow requires a secret `ITEM_VERSION_SCRAPE_PAT` to be set up in the
# repository. This should be a personal access token created at
# <https://github.com/settings/tokens> with the following permissions:
#  - Repository access: t-mart/item-version-scrape
#  - Repositiory permissions
#    - Contents: Read

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: "The type of release to perform (or none at all)"
        type: choice
        options:
          - "none"
          - "alpha"
          - "beta"
          - "release"
        required: true
        default: "release"
      data-release-tag:
        description: "The item-version-scrape release tag to pull Data.lua from"
        type: string
        required: true

jobs:
  commit:
    name: Commit new item data
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      release_ref: release
    steps:
      - name: Checkout addon code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.release_ref }}

      - name: Download generated lua from item-version-scrape release
        env:
          GH_TOKEN: ${{ secrets.ITEM_VERSION_SCRAPE_PAT }}
        run: |
          gh release download "${{ inputs.data-release-tag }}" \
            --repo t-mart/item-version-scrape \
            --pattern ItemVersionData.lua \
            --output src/ItemVersion/Data.lua

      - name: Commit & Push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/ItemVersion/Data.lua
          git commit -m "Refresh item data"
          git push origin "${{ env.release_ref }}"

  release:
    needs: commit
    uses: ./.github/workflows/release.yml
    with:
      release-type: ${{ inputs.release-type || 'release' }}
    secrets: inherit
