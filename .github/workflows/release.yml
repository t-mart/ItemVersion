name: Release

# On the release branch, this action:
# - updates the interface versions in the .toc file
# - builds the addon zip with ./dev build
# - publishes it with ./dev publish (CurseForge, and GitHub for a full release)
#
# A full release bumps the version, tags it, and merges back into master. Alpha
# and beta builds go to CurseForge only and make no git changes at all: no bump,
# no tag, no merge. They exist purely as test uploads.
#
# This workflow doesn't run on its own -- its called by other workflows that
# have put something releaseable on release branch (refresh-data.yml or
# merge-master.yml)
#
# This workflow requires a secret `CURSEFORGE_TOKEN` to be set up in the
# repository. This can be created at
# <https://legacy.curseforge.com/account/api-tokens>.

on:
  workflow_call:
    inputs:
      release-type:
        type: string
        required: true
        default: "release"

jobs:
  # Gate the release on the same checks we run on pull requests and master.
  # checks.yml doesn't trigger on the release branch, so we invoke it here as a
  # reusable workflow against release before anything gets published.
  check:
    uses: ./.github/workflows/checks.yml
    with:
      ref: release

  release:
    name: Release
    needs: check
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Release info
        run: |
          echo "::notice title=Release type::${{ inputs.release-type }}"

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: release
          fetch-depth: 0 # ensure git knows about shared history between release and master

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Our Python deps live in the dev script's PEP 723 block, not a
          # pyproject or lockfile, so key the uv cache on it. Without this the
          # cache never invalidates and setup-uv warns about it.
          cache-dependency-glob: dev

      - name: Install support tooling
        run: |
          # bump-my-version bumps our versions
          uv tool install bump-my-version
          # ./dev build fetches the embedded Ace3 libraries over SVN
          sudo apt-get install -y subversion

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # ./dev interfaces reads Blizzard's version endpoints itself, validates what
      # comes back, and rewrites the working TOC. It fails loudly on anything
      # unexpected. The change is only committed for a full release, below.
      - name: Update interface versions
        run: ./dev interfaces

      - # Push to CurseForge and make a GH release
        name: Full release
        if: ${{ inputs.release-type == 'release' }}
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n $(git status --porcelain src/ItemVersion/ItemVersion.toc) ]]; then
            git add src/ItemVersion/ItemVersion.toc
            git commit -m "Update interface versions"
          fi
          bump-my-version bump patch
          git push --follow-tags
          ./dev build
          ./dev publish --type release --yes
          git checkout master
          git merge release
          git push origin master

      - # Just push to CurseForge
        name: Pre-release
        if: ${{ inputs.release-type == 'alpha' || inputs.release-type == 'beta' }}
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: |
          ./dev build
          ./dev publish --type ${{ inputs.release-type }} --yes

      - # Just build
        name: Build only
        if: ${{ inputs.release-type == 'none' }}
        run: ./dev build

      - name: Upload build
        uses: actions/upload-artifact@v6
        with:
          name: ItemVersion
          include-hidden-files: true
          path: |
            dist/
            !dist/*.zip
