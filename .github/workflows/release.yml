name: Release

# On the release branch, this action:
# - updates the interface versions in the .toc file
# - builds the addon zip with ./dev build
# - publishes it with ./dev publish (CurseForge, and GitHub for a full release)
#
# A full release bumps the version, tags it, and merges back into master. Alpha
# and beta builds go to CurseForge only and make no git changes at all: no bump,
# no tag, no merge. They exist purely as test uploads.
#
# This workflow doesn't run on its own -- its called by other workflows that
# have put something releaseable on release branch (refresh-data.yml or
# merge-master.yml)
#
# This workflow requires a secret `CURSEFORGE_TOKEN` to be set up in the
# repository. This can be created at
# <https://legacy.curseforge.com/account/api-tokens>.

on:
  workflow_call:
    inputs:
      release-type:
        type: string
        required: true
        default: "release"
      candidate-ref:
        type: string
        required: true
      candidate-branch:
        type: string
        required: true
    outputs:
      curseforge-url:
        description: Published CurseForge file URL, when available
        value: ${{ jobs.release.outputs.curseforge-url }}
      github-url:
        description: Published GitHub release URL, when available
        value: ${{ jobs.release.outputs.github-url }}

jobs:
  # Gate the release on the same checks we run on pull requests and master.
  # checks.yml doesn't trigger on the release branch, so we invoke it here as a
  # reusable workflow against the exact candidate before anything gets published.
  check:
    uses: ./.github/workflows/checks.yml
    with:
      ref: ${{ inputs.candidate-ref }}

  release:
    name: Release
    needs: check
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      curseforge-url: ${{ steps.publication.outputs.curseforge-url }}
      github-url: ${{ steps.publication.outputs.github-url }}
    steps:
      - name: Release info
        run: |
          echo "::notice title=Release type::${{ inputs.release-type }}"

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.candidate-ref }}
          fetch-depth: 0 # ensure git knows about shared history between release and master

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Our Python deps live in the dev script's PEP 723 block, not a
          # pyproject or lockfile, so key the uv cache on it. Without this the
          # cache never invalidates and setup-uv warns about it.
          cache-dependency-glob: dev

      - name: Install support tooling
        run: |
          # ./dev build fetches the embedded Ace3 libraries over SVN
          sudo apt-get install -y subversion

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git switch -C release "${{ inputs.candidate-ref }}"

      - name: Refuse an already promoted candidate
        if: ${{ inputs.release-type == 'release' }}
        run: |
          candidate=$(git rev-parse HEAD)
          tags=$(git tag --points-at "$candidate")
          if [[ -n "$tags" ]]; then
            echo "::error::Candidate ${{ inputs.candidate-ref }} is already tagged: ${tags//$'\n'/, }"
            echo "Refusing to create another version from the same candidate."
            exit 1
          fi

          release_tip=$(git rev-parse origin/release)
          release_tags=$(git tag --points-at "$release_tip")
          if [[ -n "$release_tags" ]] && git merge-base --is-ancestor "$candidate" "$release_tip"; then
            echo "::error::Candidate ${{ inputs.candidate-ref }} was already promoted as ${release_tags//$'\n'/, }"
            echo "A prior run reached the git checkpoint. Reconcile its publishers instead of releasing again."
            exit 1
          fi

      # ./dev interfaces reads Blizzard's version endpoints itself, validates what
      # comes back, and rewrites the working TOC. It fails loudly on anything
      # unexpected. The change is only committed for a full release, below.
      - name: Update interface versions
        run: ./dev interfaces

      - name: Prepare full release
        id: full-release
        if: ${{ inputs.release-type == 'release' }}
        run: |
          if [[ -n $(git status --porcelain src/ItemVersion/ItemVersion.toc) ]]; then
            git add src/ItemVersion/ItemVersion.toc
            git commit -m "Update interface versions"
          fi

          # bump-calver rewrites the TOC's ## Version line and prints the new
          # version; we make the commit and tag here, since it does no git itself.
          new_version=$(./dev bump-calver)
          git add src/ItemVersion/ItemVersion.toc
          git commit -m "Release ${new_version}"

          git tag -a "${new_version}" -m "Release ${new_version}"
          echo "version=${new_version}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: ./dev build

      - name: Validate publish plan
        if: ${{ inputs.release-type != 'none' }}
        run: ./dev publish --type ${{ inputs.release-type }} --dry-run

      - name: Upload build
        uses: actions/upload-artifact@v6
        with:
          name: ItemVersion-${{ github.run_id }}-${{ github.run_attempt }}
          include-hidden-files: true
          path: dist/

      - name: Preflight publishing
        if: ${{ inputs.release-type != 'none' }}
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./dev publish --type ${{ inputs.release-type }} --preflight

      - name: Promote candidate to release
        if: ${{ inputs.release-type != 'release' }}
        run: git push origin release:refs/heads/release

      - name: Prepare master reconciliation
        if: ${{ inputs.release-type == 'release' }}
        run: |
          git switch -C master-reconcile origin/master
          git merge --no-edit release
          git switch release

      - name: Push release refs atomically
        if: ${{ inputs.release-type == 'release' }}
        run: |
          git push --atomic origin \
            release:refs/heads/release \
            master-reconcile:refs/heads/master \
            "refs/tags/${{ steps.full-release.outputs.version }}:refs/tags/${{ steps.full-release.outputs.version }}"

      - name: Publish full release
        if: ${{ inputs.release-type == 'release' }}
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./dev publish --type release --yes --result-file "$RUNNER_TEMP/publish-result.json"

      - name: Publish pre-release
        if: ${{ inputs.release-type == 'alpha' || inputs.release-type == 'beta' }}
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: ./dev publish --type ${{ inputs.release-type }} --yes --result-file "$RUNNER_TEMP/publish-result.json"

      - name: Summarize publication
        id: publication
        if: ${{ always() && inputs.release-type != 'none' }}
        continue-on-error: true
        run: |
          result="$RUNNER_TEMP/publish-result.json"
          if [[ ! -s "$result" ]]; then
            printf '## Publication\n\nNo structured publishing result was produced.\n' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if ! jq -e 'type == "object"' "$result" > /dev/null; then
            printf '## Publication\n\nThe publishing result could not be read.\n' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          version=$(jq -r '.version // "unknown"' "$result")
          {
            echo "## Publication"
            echo
            echo "- Version: \`${version}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          curseforge_status=$(jq -r '.targets.curseforge.status // empty' "$result")
          if [[ -n "$curseforge_status" ]]; then
            curseforge_url=$(jq -r '.targets.curseforge.public_url // .targets.curseforge.author_url // empty' "$result")
            author_url=$(jq -r '.targets.curseforge.author_url // empty' "$result")
            if [[ "$curseforge_status" == "published" && -n "$curseforge_url" ]]; then
              if [[ -n "$author_url" && "$author_url" != "$curseforge_url" ]]; then
                echo "- CurseForge: [published file](${curseforge_url}) ([author dashboard](${author_url}))" >> "$GITHUB_STEP_SUMMARY"
              else
                echo "- CurseForge: [published file](${curseforge_url})" >> "$GITHUB_STEP_SUMMARY"
              fi
              echo "curseforge-url=${curseforge_url}" >> "$GITHUB_OUTPUT"
              echo "::notice title=CurseForge release::${curseforge_url}"
            else
              echo "- CurseForge: ${curseforge_status}" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          github_status=$(jq -r '.targets.github.status // empty' "$result")
          if [[ -n "$github_status" ]]; then
            github_url=$(jq -r '.targets.github.url // empty' "$result")
            if [[ "$github_status" == "published" && -n "$github_url" ]]; then
              echo "- GitHub: [release](${github_url})" >> "$GITHUB_STEP_SUMMARY"
              echo "github-url=${github_url}" >> "$GITHUB_OUTPUT"
              echo "::notice title=GitHub release::${github_url}"
            else
              echo "- GitHub: ${github_status}" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Clean up candidate branch
        if: ${{ success() }}
        continue-on-error: true
        run: git push origin --delete "${{ inputs.candidate-branch }}"
