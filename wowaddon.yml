# yaml-language-server: $schema=tooling/schemas/wowaddon.schema.json
#
# Project configuration for the ./dev tooling.
#
# name 
#   the addon folder under src/ and the base of the packaged zip name
# curseforge-project-id
#   the project this uploads to on CurseForge
# curseforge-project-slug
#   the slug of the project on CurseForge, used for linking to the uploaded
#   files on CurseForge. This value can be found in the Addon URL:
#   https://www.curseforge.com/wow/addons/<slug>
# changelog-url
#   optional link used as the release notes on publish
# version
#   how `./dev bump-calver` reads and writes the version, which lives only in the
#   TOC. `pattern` locates it (via a `version` group or the first group) and
#   `format` is the calver template: {YYYY} ISO week-year, {0W} zero-padded ISO
#   week, {N} the 0-based serial that resets each new week
# dev-only
#   files under the addon dir that exist for development and never ship. They are
#   kept out of the build, and any TOC line that references one is stripped from
#   the built TOC. Bindings.xml (dev keybinds) loads in dev via WoW auto-loading;
#   a file listed in the TOC (like DevTests.lua) loads in a symlinked dev install
#   and is dropped, line and all, when packaged.
# libs
#   embedded libraries, fetched by `./dev prepare-src`. Each maps a folder under
#   ItemVersion/Libs to the SVN url it comes from

name: ItemVersion

curseforge-project-id: 433258
curseforge-project-slug: itemversion

changelog-url: https://github.com/t-mart/ItemVersion/blob/master/CHANGELOG.md

version:
  file: src/ItemVersion/ItemVersion.toc
  pattern: '## Version: (?P<version>\S+)'
  format: '{YYYY}.{0W}.{N}'

dev-only:
  - Bindings.xml
  - DevTests.lua

libs:
  AceAddon-3.0: https://repos.curseforge.com/wow/ace3/trunk/AceAddon-3.0
  AceConfig-3.0: https://repos.curseforge.com/wow/ace3/trunk/AceConfig-3.0
  AceConsole-3.0: https://repos.curseforge.com/wow/ace3/trunk/AceConsole-3.0
  AceDB-3.0: https://repos.curseforge.com/wow/ace3/trunk/AceDB-3.0
  AceDBOptions-3.0: https://repos.curseforge.com/wow/ace3/trunk/AceDBOptions-3.0
  AceGUI-3.0: https://repos.curseforge.com/wow/ace3/trunk/AceGUI-3.0
  AceLocale-3.0: https://repos.curseforge.com/wow/ace3/trunk/AceLocale-3.0
  CallbackHandler-1.0: https://repos.curseforge.com/wow/callbackhandler/trunk/CallbackHandler-1.0
  LibSharedMedia-3.0: https://repos.curseforge.com/wow/libsharedmedia-3-0/trunk
  LibStub: https://repos.curseforge.com/wow/libstub/trunk
